# Tiqora deployment example (NOT production-hardened)
#
# Copy to docker-compose.yml, set secrets in a sibling .env, and review
# network/TLS at your reverse proxy before production traffic.
#
# Required .env variables (compose refuses to start if any are missing):
#   POSTGRES_PASSWORD
#   REDIS_PASSWORD
#   MEILI_MASTER_KEY
#   TIQORA_SECRET_KEY
# Optional:
#   TIQORA_CORS_ORIGINS   (default: https://helpdesk.example.com)
#   MYSQL_PASSWORD / MYSQL_ROOT_PASSWORD  (only if using the mariadb service)
#
# Images: ghcr.io/cygnusnetworks/tiqora  (or docker.io/cygnusnetworks/tiqora)
#
# Database choice: enable EITHER postgres OR mariadb (not both), and set
# DATABASE_URL accordingly.
#
# Ports 8000/8001 are bound to 127.0.0.1 so only a local reverse proxy (or
# host-local scrape) can reach them. Change the bind if you intentionally
# expose the app without a proxy (not recommended).

services:
  # --- Option A: PostgreSQL ---
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: tiqora
      POSTGRES_USER: tiqora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - tiqora_pg:/var/lib/postgresql/data
    # Do not publish DB ports publicly in production.
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiqora -d tiqora"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Option B: MariaDB (comment out postgres and use this instead) ---
  # mariadb:
  #   image: mariadb:10.11
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: tiqora
  #     MYSQL_USER: tiqora
  #     MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
  #   volumes:
  #     - tiqora_mysql:/var/lib/mysql
  #   command:
  #     - --character-set-server=utf8mb4
  #     - --collation-server=utf8mb4_unicode_ci
  #   healthcheck:
  #     test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    volumes:
      - tiqora_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in .env}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - tiqora_meili:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  tiqora-api:
    # Serves the REST/portal/compat API AND the web UI (SPA) at "/", so a single
    # image ships backend + frontend — point your reverse proxy's "/" here.
    # Set TIQORA_SERVE_FRONTEND=0 to disable and front the UI with a static host.
    image: ghcr.io/cygnusnetworks/tiqora:latest
    # image: cygnusnetworks/tiqora:latest  # Docker Hub mirror
    restart: unless-stopped
    command: ["api"]
    environment:
      # PostgreSQL:
      DATABASE_URL: postgresql+asyncpg://tiqora:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/tiqora
      # MariaDB alternative:
      # DATABASE_URL: mysql+aiomysql://tiqora:${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}@mariadb:3306/tiqora
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379/0
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in .env}
      TIQORA_SECRET_KEY: ${TIQORA_SECRET_KEY:?set TIQORA_SECRET_KEY in .env}
      TIQORA_ENV: production
      TIQORA_LOG_LEVEL: INFO
      # Secure session cookies (HTTPS). Override only if you know why.
      TIQORA_SESSION_COOKIE_SECURE: "true"
      TIQORA_CORS_ORIGINS: ${TIQORA_CORS_ORIGINS:-https://helpdesk.example.com}
      # Keep false until post-cutover schema ownership (Phase 5)
      TIQORA_SCHEMA_OWNERSHIP: "false"
      # Optional: disable public /metrics if scrape is only via private network
      # TIQORA_METRICS_ENABLED: "false"
      # Optional: enforce CSP (default is report-only — safer for SPA)
      # TIQORA_CSP_ENFORCE: "true"
      # Kerberos / SPNEGO (optional). Image ships gssapi + libkrb5; stays inert
      # until enabled. Prod SPN: HTTP/tiqora.cygnusnetworks.de@CYGNUSNETWORKS.DE
      # TIQORA_SPNEGO_ENABLED: "true"
      # KRB5_KTNAME: /etc/tiqora/tiqora.keytab
    # volumes:
    #   # Service keytab (read-only). Export from KDC for the SPN above.
    #   - ./secrets/tiqora.keytab:/etc/tiqora/tiqora.keytab:ro
    #   # Optional: for a pure acceptor, krb5.conf is usually not required
    #   # (ticket is decrypted with the keytab; no KDC round-trip). A
    #   # `default_realm = CYGNUSNETWORKS.DE` can still help.
    #   - ./secrets/krb5.conf:/etc/krb5.conf:ro
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  tiqora-worker:
    image: ghcr.io/cygnusnetworks/tiqora:latest
    restart: unless-stopped
    command: ["worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://tiqora:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/tiqora
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379/0
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in .env}
      TIQORA_SECRET_KEY: ${TIQORA_SECRET_KEY:?set TIQORA_SECRET_KEY in .env}
      TIQORA_ENV: production
      TIQORA_LOG_LEVEL: INFO
    depends_on:
      - tiqora-api
      - redis
    healthcheck:
      # No HTTP port — the worker touches a heartbeat file each cycle; this
      # checks it is fresh (i.e. the asyncio event loop is alive).
      test: ["CMD-SHELL", "python -c \"import os,sys,time; f=os.environ.get('TIQORA_WORKER_HEARTBEAT_FILE','/tmp/tiqora-worker.heartbeat'); sys.exit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f) < 90 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  tiqora-ai-worker:
    # Own process for the Tiqora AI subsystem (~/TIQORA_LLM_PLAN.md §3.0/§3.4)
    # — independent of tiqora-worker so a hung LLM call never affects
    # postmaster/outbox/indexer, and so it can be stopped alone as a
    # cost/incident kill switch. Stays inert until an admin sets
    # operation_mode=tiqora_primary AND enables daemon.ai_worker.enabled.
    image: ghcr.io/cygnusnetworks/tiqora:latest
    restart: unless-stopped
    command: ["ai-worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://tiqora:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/tiqora
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379/0
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in .env}
      TIQORA_SECRET_KEY: ${TIQORA_SECRET_KEY:?set TIQORA_SECRET_KEY in .env}
      TIQORA_ENV: production
      TIQORA_LOG_LEVEL: INFO
    depends_on:
      - tiqora-api
      - redis
    healthcheck:
      # No HTTP port — same heartbeat-file pattern as tiqora-worker, own file.
      test: ["CMD-SHELL", "python -c \"import os,sys,time; f=os.environ.get('TIQORA_AI_WORKER_HEARTBEAT_FILE','/tmp/tiqora-ai-worker.heartbeat'); sys.exit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f) < 90 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  tiqora-mcp:
    image: ghcr.io/cygnusnetworks/tiqora:latest
    restart: unless-stopped
    command: ["mcp"]
    environment:
      DATABASE_URL: postgresql+asyncpg://tiqora:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/tiqora
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379/0
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in .env}
      TIQORA_SECRET_KEY: ${TIQORA_SECRET_KEY:?set TIQORA_SECRET_KEY in .env}
      TIQORA_ENV: production
      TIQORA_LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      - tiqora-api
    healthcheck:
      # FastMCP streamable-HTTP returns 404 on "/" — any HTTP response proves
      # the server is listening (a bare liveness check, not MCP-protocol auth).
      test: ["CMD-SHELL", "curl -s -o /dev/null http://127.0.0.1:8001/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Optional: catch SMTP in non-production
  # mailpit:
  #   image: axllent/mailpit:latest
  #   ports:
  #     - "127.0.0.1:8025:8025"
  #     - "127.0.0.1:1025:1025"

volumes:
  tiqora_pg:
  # tiqora_mysql:
  tiqora_redis:
  tiqora_meili:
