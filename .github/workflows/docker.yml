name: Docker

# Day-to-day (push to main): native linux/amd64 only — fast, no QEMU.
# Release tags (v*): multi-arch linux/amd64 + linux/arm64.
# Manual dispatch can force multi-arch via the multiarch input.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      multiarch:
        description: "Build multi-arch (amd64 + arm64) even without a v* tag"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/cygnusnetworks/tiqora
  DOCKERHUB_IMAGE: cygnusnetworks/tiqora

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    env:
      # Docker Hub push is optional: it only happens when the secrets are configured.
      HAS_DOCKERHUB: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_TOKEN != '' }}
      # Multi-arch on release tags, or when workflow_dispatch forces it.
      MULTIARCH: ${{ (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.multiarch)) && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` can compute the tag distance.
          fetch-depth: 0

      - name: Compute version string
        id: version
        run: |
          echo "describe=$(git describe --tags --long --always 2>/dev/null || git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Determine platforms
        id: platforms
        run: |
          if [ "${MULTIARCH}" = "true" ]; then
            echo "list=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "label=multi-arch (amd64+arm64)" >> "$GITHUB_OUTPUT"
          else
            echo "list=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "label=amd64 only" >> "$GITHUB_OUTPUT"
          fi
          echo "Building for: $( [ "${MULTIARCH}" = "true" ] && echo multi-arch || echo amd64-only )"

      - name: Determine target images
        id: images
        run: |
          {
            echo 'list<<EOF'
            echo "${GHCR_IMAGE}"
            if [ "${HAS_DOCKERHUB}" = "true" ]; then
              echo "${DOCKERHUB_IMAGE}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up QEMU
        if: env.MULTIARCH == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push (${{ steps.platforms.outputs.label }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.platforms.outputs.list }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_VERSION=${{ steps.version.outputs.describe }}
            VITE_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
