name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src tests
      - name: Ruff format
        run: uv run ruff format --check src tests
      - name: Mypy
        run: uv run mypy src/tiqora

  backend-test:
    name: Backend tests (${{ matrix.db }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [postgres, mariadb]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tiqora
          POSTGRES_PASSWORD: tiqora
          POSTGRES_DB: tiqora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tiqora -d tiqora"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tiqora
          MYSQL_USER: tiqora
          MYSQL_PASSWORD: tiqora
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 10
    env:
      REDIS_URL: redis://localhost:6379/0
      MEILI_URL: http://localhost:7700
      MEILI_MASTER_KEY: tiqora-dev-master-key
      TIQORA_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set DATABASE_URL
        run: |
          if [ "${{ matrix.db }}" = "postgres" ]; then
            echo "DATABASE_URL=postgresql+asyncpg://tiqora:tiqora@localhost:5432/tiqora" >> "$GITHUB_ENV"
          else
            echo "DATABASE_URL=mysql+aiomysql://tiqora:tiqora@localhost:3306/tiqora" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Pytest
        run: uv run pytest -q

  frontend:
    name: Frontend (lint, build, vitest, e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build api-client
        run: pnpm --filter @tiqora/api-client build
      - name: Lint
        run: pnpm --filter tiqora-frontend lint
      - name: Typecheck + build
        run: pnpm --filter tiqora-frontend build
      - name: Vitest
        run: pnpm --filter tiqora-frontend test
      - name: Install Playwright Chromium
        run: pnpm --filter tiqora-frontend exec playwright install --with-deps chromium
      - name: Playwright e2e (mocked API)
        run: pnpm --filter tiqora-frontend e2e
        continue-on-error: true
