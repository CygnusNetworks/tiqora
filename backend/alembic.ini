[alembic]
script_location = alembic
# Active chain during parallel operation: tiqora_* tables ONLY.
# CRITICAL: versions_owned is deliberately NOT listed here. Alembic builds
# its ScriptDirectory (and resolves "head") from THIS file BEFORE env.py
# runs, so env.py cannot gate which chain is visible — the only effective
# lever is the version_locations passed in the Config object. Therefore a
# plain `alembic upgrade head` is safe by default (stops at the tiqora head
# and never touches Znuny tables). The owned chain is applied only via
# `tiqora migrate upgrade`, which appends versions_owned to version_locations
# at runtime after verifying the ownership gate (env flag + DB marker).
path_separator = os
version_locations = alembic/versions_tiqora
# Default path for `alembic revision` — owned chain is gated (see versions_owned/README.md)
version_path = alembic/versions_tiqora

sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
