[alembic]
script_location = alembic
# Active chain during parallel operation: tiqora_* tables only.
version_path_separator = os
version_locations = alembic/versions_tiqora:alembic/versions_owned
# Default path for `alembic revision` — owned chain is gated (see versions_owned/README.md)
version_path = alembic/versions_tiqora

sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
